version: 2

models:
  - name: investor_360
    description: >
      Gold Investor 360 for an asset manager. Snowflake-managed Iceberg table combining
      client profile (CRM), cash flows (subscriptions/redemptions & trades), and market
      valuation (reference data) into a single assets-under-management view for AI.
    config:
      contract:
        enforced: false
    columns:
      - name: investor_id
        description: "Unique investor / client identifier."
        tests: [not_null, unique]
      - name: investor_segment
        tests:
          - accepted_values:
              values: ['INSTITUTIONAL','PENSION','ENDOWMENT','HNW','WEALTH']
      - name: assets_under_management
        description: "Cash balance + market value of holdings (AUM)."
        tests: [not_null]
      - name: holdings_value
        description: "Net trade positions valued at latest instrument price."

  - name: portfolio_risk
    description: >
      Gold portfolio risk (Snowflake-managed Iceberg) at investor x instrument grain:
      net positions valued at market, exposure, unrealized P&L, enriched with the
      instrument's latest earnings-call sentiment/summary.
    columns:
      - name: investor_id
        tests: [not_null]
      - name: symbol
        tests: [not_null]
      - name: gross_exposure
        tests: [not_null]
      - name: earnings_sentiment
        tests:
          - accepted_values:
              values: ['positive','negative','neutral','mixed']
              config:
                where: "earnings_sentiment is not null"

  - name: investor_risk
    description: >
      Gold investor-level risk summary (Snowflake-managed Iceberg): exposure, VaR,
      risk limit and breach flag, plus derived portfolio exposure.
    columns:
      - name: investor_id
        tests: [not_null, unique]
      - name: var_95
        tests: [not_null]
